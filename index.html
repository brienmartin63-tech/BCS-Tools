<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BCS Activation Chit Selector 2.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #efe6d0;
  color: #1f1f1f;
}

.container {
  max-width: 950px;
  margin: auto;
  padding: 16px;
}

.header {
  text-align: center;
  background: #2f2b24;
  color: white;
  padding: 18px;
  border-radius: 12px;
  margin-bottom: 16px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.flags {
  font-size: 26px;
  margin-top: 8px;
}

.card {
  background: #fffaf0;
  border: 2px solid #3d3528;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 3px 3px 8px rgba(0,0,0,.18);
}

h2 {
  margin-top: 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

@media (max-width: 700px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input[type="number"],
input[type="text"] {
  width: 100%;
  padding: 10px;
  font-size: 17px;
  box-sizing: border-box;
  border: 2px solid #777;
  border-radius: 8px;
  background: white;
}

button {
  background: #2f2b24;
  color: white;
  border: none;
  padding: 13px 18px;
  font-size: 17px;
  border-radius: 9px;
  cursor: pointer;
  margin: 8px 6px 0 0;
}

button:hover {
  background: #4d4538;
}

button:disabled {
  background: #999;
  cursor: not-allowed;
}

.big-button {
  width: 100%;
  font-size: 22px;
  padding: 18px;
  margin-top: 10px;
}

.allied-title {
  color: #1f5fbf;
}

.axis-title {
  color: #9f1f1f;
}

.radio-option {
  border: 2px solid #b7aa91;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  background: #fff;
}

.radio-option input {
  transform: scale(1.2);
  margin-right: 8px;
}

.chit-input-card {
  background: white;
  border: 2px solid #888;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 10px;
}

.chit-counter {
  display: inline-block;
  min-width: 130px;
  padding: 14px;
  margin: 8px;
  background: #fdfdfd;
  border: 3px solid #333;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
  box-shadow: 2px 2px 5px rgba(0,0,0,.25);
}

.allied-counter {
  border-color: #1f5fbf;
}

.axis-counter {
  border-color: #9f1f1f;
}

.draw-line {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  font-size: 18px;
}

.winner-box {
  margin-top: 14px;
  padding: 16px;
  border-radius: 12px;
  background: #e8ffe8;
  border-left: 8px solid #248224;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
}

.activate-box {
  margin-top: 14px;
  padding: 16px;
  background: #fff3c4;
  border-left: 8px solid #c99b15;
  border-radius: 12px;
  text-align: center;
}

.choice-button {
  background: white;
  color: #222;
  border: 3px solid #333;
  margin: 8px;
  min-width: 140px;
}

.choice-button:hover {
  background: #f0eadc;
}

.selected-box {
  margin-top: 14px;
  padding: 16px;
  background: #dfeeff;
  border-left: 8px solid #1f5fbf;
  border-radius: 12px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.small {
  color: #555;
  font-size: 14px;
}
</style>
</head>

<body>
<div class="container">

  <div class="header">
    <h1>BCS Activation Chit Selector 2.0</h1>
    <div class="flags">🇺🇸 🇬🇧 ★ &nbsp;&nbsp; ⚔ &nbsp;&nbsp; 🇩🇪 🇮🇹</div>
  </div>

  <div class="card">
    <h2>Setup</h2>
    <div class="grid">
      <div>
        <h3 class="allied-title">🇺🇸 🇬🇧 ★ Allied Chits</h3>
        <label for="alliedCount">Number of Allied Activation Chits</label>
        <input type="number" id="alliedCount" min="0" value="0">
      </div>
      <div>
        <h3 class="axis-title">🇩🇪 🇮🇹 Axis Chits</h3>
        <label for="axisCount">Number of Axis Activation Chits</label>
        <input type="number" id="axisCount" min="0" value="0">
      </div>
    </div>
    <button onclick="createChitFields()">Create Chit Fields</button>
  </div>

  <div class="card">
    <h2>Activation Rule</h2>

    <div class="radio-option">
      <label>
        <input type="radio" name="activationRule" value="official" checked>
        <strong>Official BCS</strong><br>
        <span class="small">The first winning-side chit drawn must activate.</span>
      </label>
    </div>

    <div class="radio-option">
      <label>
        <input type="radio" name="activationRule" value="choice">
        <strong>Player Choice</strong><br>
        <span class="small">The player chooses from the winning-side chits drawn.</span>
      </label>
    </div>
  </div>

  <div class="card" id="chitFields">
    <h2>Chit Entry</h2>
    <p>Enter chit counts above, then click <strong>Create Chit Fields</strong>.</p>
  </div>

  <div class="card">
    <h2>Draw</h2>
    <button class="big-button" onclick="drawActivation()">🎲 Draw Next Activation</button>
    <button onclick="clearResults()">Clear Results</button>

    <div id="results"></div>
  </div>

</div>

<script>
let drawNumber = 0;

function createChitFields() {
  const alliedCount = Number(document.getElementById("alliedCount").value);
  const axisCount = Number(document.getElementById("axisCount").value);
  const box = document.getElementById("chitFields");

  box.innerHTML = "<h2>Chit Entry</h2>";

  box.innerHTML += '<h3 class="allied-title">🇺🇸 🇬🇧 ★ Allied Chits</h3>';
  for (let i = 0; i < alliedCount; i++) {
    box.innerHTML += `
      <div class="chit-input-card">
        <label>Allied Chit ${i + 1}</label>
        <input type="text" id="allied-${i}" placeholder="Example: 3/116 Infantry">
      </div>
    `;
  }

  box.innerHTML += '<h3 class="axis-title">🇩🇪 🇮🇹 Axis Chits</h3>';
  for (let i = 0; i < axisCount; i++) {
    box.innerHTML += `
      <div class="chit-input-card">
        <label>Axis Chit ${i + 1}</label>
        <input type="text" id="axis-${i}" placeholder="Example: 1/429">
      </div>
    `;
  }
}

function getChits() {
  const alliedCount = Number(document.getElementById("alliedCount").value);
  const axisCount = Number(document.getElementById("axisCount").value);
  const chits = [];

  for (let i = 0; i < alliedCount; i++) {
    const value = document.getElementById(`allied-${i}`)?.value.trim();
    if (value) chits.push({ side: "Allied", name: value, flag: "🇺🇸", css: "allied-counter" });
  }

  for (let i = 0; i < axisCount; i++) {
    const value = document.getElementById(`axis-${i}`)?.value.trim();
    if (value) chits.push({ side: "Axis", name: value, flag: "🇩🇪", css: "axis-counter" });
  }

  return chits;
}

function shuffle(list) {
  const array = [...list];
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function drawActivation() {
  const chits = getChits();
  const results = document.getElementById("results");

  if (chits.length < 2) {
    results.innerHTML = "<p><strong>Please enter at least two chits.</strong></p>";
    return;
  }

  const shuffled = shuffle(chits);
  const drawn = [];
  const alliedDrawn = [];
  const axisDrawn = [];

  for (const chit of shuffled) {
    drawn.push(chit);

    if (chit.side === "Allied") alliedDrawn.push(chit);
    if (chit.side === "Axis") axisDrawn.push(chit);

    if (alliedDrawn.length === 2 || axisDrawn.length === 2) break;
    if (drawn.length === 3) break;
  }

  let winningSide;

  if (alliedDrawn.length > axisDrawn.length) {
    winningSide = "Allied";
  } else if (axisDrawn.length > alliedDrawn.length) {
    winningSide = "Axis";
  } else {
    winningSide = drawn[0].side;
  }

  const winningChits = drawn.filter(chit => chit.side === winningSide);
  const rule = document.querySelector('input[name="activationRule"]:checked').value;

  drawNumber++;

  let html = `<h3>Activation Draw ${drawNumber}</h3>`;

  drawn.forEach((chit, index) => {
    html += `
      <div class="draw-line">
        Draw #${index + 1}: 
        <span class="chit-counter ${chit.css}">
          ${chit.flag}<br>${chit.name}
        </span>
      </div>
    `;
  });

  const winnerFlag = winningSide === "Allied" ? "🇺🇸" : "🇩🇪";

  html += `
    <div class="winner-box">
      ${winnerFlag} ${winningSide.toUpperCase()} ACTIVATION
    </div>
  `;

  if (rule === "official") {
    const selected = winningChits[0];
    html += `
      <div class="activate-box">
        <strong>Activate:</strong><br>
        <span class="chit-counter ${selected.css}">
          ${selected.flag}<br>${selected.name}
        </span>
      </div>
    `;
  } else {
    html += `
      <div class="activate-box">
        <strong>Choose one unit to activate:</strong><br>
    `;

    winningChits.forEach((chit, index) => {
      html += `
        <button class="choice-button" onclick="selectActivation('${escapeText(chit.name)}','${chit.flag}','${chit.css}')">
          ${chit.flag}<br>${chit.name}
        </button>
      `;
    });

    html += `</div><div id="selectedActivation"></div>`;
  }

  results.innerHTML = html;
}

function selectActivation(name, flag, css) {
  const box = document.getElementById("selectedActivation");
  box.innerHTML = `
    <div class="selected-box">
      SELECTED ACTIVATION<br>
      <span class="chit-counter ${css}">
        ${flag}<br>${name}
      </span>
      <br>Ready for the next activation.
    </div>
  `;

  document.querySelectorAll(".choice-button").forEach(button => {
    button.disabled = true;
  });
}

function clearResults() {
  document.getElementById("results").innerHTML = "";
  drawNumber = 0;
}

function escapeText(text) {
  return text.replace(/'/g, "\\'").replace(/"/g, "&quot;");
}
</script>

</body>
</html>
