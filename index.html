<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BCS Activation Chit Selector</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: 20px auto;
  padding: 15px;
  background: #f4f1ea;
  color: #222;
}

h1 { text-align: center; }

.card {
  background: white;
  border: 2px solid #333;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 18px;
}

label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

input[type="number"],
input[type="text"] {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  background: #333;
  color: white;
  border: none;
  padding: 12px 18px;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 12px;
}

button:hover { background: #555; }

.radio-row {
  margin: 8px 0;
}

.side-title {
  font-size: 20px;
  font-weight: bold;
  margin-top: 15px;
}

.allied { color: #1f5fbf; font-weight: bold; }
.axis { color: #b22222; font-weight: bold; }

.draw-line {
  padding: 6px;
  border-bottom: 1px solid #ddd;
}

.winner {
  background: #e5ffe5;
  border-left: 6px solid #268a26;
  padding: 10px;
  margin-top: 12px;
  font-weight: bold;
}

.choose-box {
  margin-top: 10px;
  padding: 10px;
  background: #fff7d6;
  border-left: 6px solid #d4a017;
}

.small {
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<h1>BCS Activation Chit Selector</h1>

<div class="card">
  <h2>Setup</h2>

  <label for="alliedCount">🇺🇸 Allied Activation Chits</label>
  <input type="number" id="alliedCount" min="0" value="0">

  <label for="axisCount">🇩🇪 Axis Activation Chits</label>
  <input type="number" id="axisCount" min="0" value="0">

  <button onclick="createChitFields()">Create Chit Fields</button>
</div>

<div class="card">
  <h2>Activation Rule</h2>

  <div class="radio-row">
    <input type="radio" name="activationRule" value="first" checked>
    Activate first winning chit drawn
  </div>

  <div class="radio-row">
    <input type="radio" name="activationRule" value="choose">
    Player chooses any winning chit drawn
  </div>

  <p class="small">Each activation is triggered manually. The app will not auto-advance.</p>
</div>

<div class="card" id="chitFields">
  <h2>Chits</h2>
  <p>Enter chit counts, then click <strong>Create Chit Fields</strong>.</p>
</div>

<div class="card">
  <h2>Draw</h2>
  <button onclick="drawActivation()">Draw Next Activation</button>
  <button onclick="clearResults()">Clear Results</button>

  <div id="results"></div>
</div>

<script>
let drawNumber = 0;

function createChitFields() {
  const alliedCount = Number(document.getElementById("alliedCount").value);
  const axisCount = Number(document.getElementById("axisCount").value);
  const box = document.getElementById("chitFields");

  box.innerHTML = "<h2>Chits</h2>";

  box.innerHTML += '<div class="side-title allied">🇺🇸 Allied Chits</div>';
  for (let i = 0; i < alliedCount; i++) {
    box.innerHTML += `
      <label>Allied Chit ${i + 1}</label>
      <input type="text" id="allied-${i}" placeholder="Example: 3/116">
    `;
  }

  box.innerHTML += '<div class="side-title axis">🇩🇪 Axis Chits</div>';
  for (let i = 0; i < axisCount; i++) {
    box.innerHTML += `
      <label>Axis Chit ${i + 1}</label>
      <input type="text" id="axis-${i}" placeholder="Example: 1/429">
    `;
  }
}

function getChits() {
  const alliedCount = Number(document.getElementById("alliedCount").value);
  const axisCount = Number(document.getElementById("axisCount").value);
  const chits = [];

  for (let i = 0; i < alliedCount; i++) {
    const value = document.getElementById(`allied-${i}`)?.value.trim();
    if (value) chits.push({ side: "Allied", name: value, flag: "🇺🇸" });
  }

  for (let i = 0; i < axisCount; i++) {
    const value = document.getElementById(`axis-${i}`)?.value.trim();
    if (value) chits.push({ side: "Axis", name: value, flag: "🇩🇪" });
  }

  return chits;
}

function shuffle(list) {
  const array = [...list];

  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }

  return array;
}

function drawActivation() {
  const chits = getChits();
  const results = document.getElementById("results");

  if (chits.length < 2) {
    results.innerHTML = "<p><strong>Please enter at least two chits.</strong></p>";
    return;
  }

  const shuffled = shuffle(chits);
  const drawn = [];
  const alliedDrawn = [];
  const axisDrawn = [];

  for (const chit of shuffled) {
    drawn.push(chit);

    if (chit.side === "Allied") alliedDrawn.push(chit);
    if (chit.side === "Axis") axisDrawn.push(chit);

    if (alliedDrawn.length === 2 || axisDrawn.length === 2) break;
    if (drawn.length === 3) break;
  }

  let winningSide;

  if (alliedDrawn.length > axisDrawn.length) {
    winningSide = "Allied";
  } else if (axisDrawn.length > alliedDrawn.length) {
    winningSide = "Axis";
  } else {
    winningSide = drawn[0].side;
  }

  const winningChits = drawn.filter(chit => chit.side === winningSide);
  const rule = document.querySelector('input[name="activationRule"]:checked').value;

  drawNumber++;

  let html = `<h3>Activation Draw ${drawNumber}</h3>`;

  drawn.forEach((chit, index) => {
    const sideClass = chit.side === "Allied" ? "allied" : "axis";

    html += `
      <div class="draw-line">
        Draw #${index + 1}: 
        <span class="${sideClass}">${chit.flag} ${chit.side}</span>
        — ${chit.name}
      </div>
    `;
  });

  const winnerFlag = winningSide === "Allied" ? "🇺🇸" : "🇩🇪";
  const winnerClass = winningSide === "Allied" ? "allied" : "axis";

  html += `
    <div class="winner">
      ${winnerFlag} <span class="${winnerClass}">${winningSide}</span> wins activation.
    </div>
  `;

  if (rule === "first") {
    html += `
      <div class="choose-box">
        <strong>Activate:</strong><br>
        ${winningChits[0].flag} ${winningChits[0].name}
      </div>
    `;
  } else {
    html += `
      <div class="choose-box">
        <strong>Player chooses one:</strong><br>
    `;

    winningChits.forEach(chit => {
      html += `• ${chit.flag} ${chit.name}<br>`;
    });

    html += `</div>`;
  }

  results.innerHTML = html;
}

function clearResults() {
  document.getElementById("results").innerHTML = "";
  drawNumber = 0;
}
</script>

</body>
</html>
